name: Bug report
description: Report unexpected behaviour.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out as
        much of the form as you can — reproducible reports get fixed fastest.

        **Security-sensitive bug?** Stop here and follow [SECURITY.md](https://github.com/peacefulstudio/canton-dotnet-sdk-mini-demo/blob/main/SECURITY.md)
        instead of opening a public issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Minimal example and the commands you ran. Redact secrets.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error output and any relevant debug logs (with secrets redacted).
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: |
        The commit SHA you reproduced this on (the demo tracks `main` and is
        not released as versioned packages).
      placeholder: "main @ 1a2b3c4"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.1 / Ubuntu 24.04 / Windows 11"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help — workarounds tried, related issues, suspected root cause.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/peacefulstudio/canton-dotnet-sdk-mini-demo/blob/main/CODE_OF_CONDUCT.md).
          required: true
